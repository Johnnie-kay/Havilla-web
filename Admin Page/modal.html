<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Havilla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
    <!-- ERROR MODAL -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-[#0A243F]">Incorrect Code</h3>
                <button onclick="closeModal('errorModal')" class="text-gray-400 hover:text-gray-600">⊗</button>
            </div>
            <div class="flex justify-center my-4">
                <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center">
                    <span class="text-red-500 text-xl">✕</span>
                </div>
            </div>
            <p class="text-sm text-gray-500 text-center mb-6">The verification code you entered is incorrect. Please try again or request a new code.</p>
            <div class="flex justify-end">
                <button onclick="closeModal('errorModal')" class="bg-[#0A243F] text-white px-5 py-2 rounded-lg text-sm hover:bg-[#F4A160] transition-colors duration-200">Try Again</button>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-[#0A243F]">Verification Successful</h3>
                <button onclick="closeModal('successModal')" class="text-gray-400 hover:text-gray-600">⊗</button>
            </div>
            <div class="flex justify-center my-4">
                <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
                    <span class="text-green-500 text-xl">✓</span>
                </div>
            </div>
            <p class="text-sm text-gray-500 text-center mb-6">Your code has been verified successfully. Please continue to the next step.</p>
            <div class="flex justify-end">
                <button onclick="window.location.href='success.html'" class="bg-[#0A243F] text-white px-5 py-2 rounded-lg text-sm hover:bg-[#F4A160] transition-colors duration-200">Continue</button>
            </div>
        </div>
    </div>
</body>
