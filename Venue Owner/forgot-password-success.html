<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Havilla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-lg w-full max-w-2xl p-10">

            <nav class="md:hidden flex items-center justify-between py-2 mb-6 ">
                <div class="flex justify-center items-center gap-2">
                    <img src="/Images/Logo.png" alt="Logo">
                    <p class="text-[#0A243F] font-bold text-lg">Havilla.</p>
                </div>
                <button id="menuBtn" onclick="toggleMenu()" class="md:hidden text-[#0A243F] text-2xl">☰</button>
        </nav>

            <div id="mobileMenu" class="hidden md:hidden flex-col gap-4 px-6 pb-4 text-sm bg-white">
                <a class="text-[#0A243F] font-medium" href="#">Home</a>
                <a class="text-[#0A243F] opacity-50" href="#">How it works</a>
                <a class="text-[#0A243F] opacity-50" href="#">Features</a>
                <a class="text-[#0A243F]" href="#">Sign in</a>
            </div>

                <!-- Illustration -->
                <img src="../Images/Password-img.png" alt="Success" class="w-52 mb-6">

                <!-- Text -->
                <h2 class="text-lg font-bold text-[#0A243F] text-center mb-2">Your password has been reset successfully.</h2>
                <p class="text-sm text-gray-500 text-center mb-6">
                    Password changed successfully. Log back in to continue managing your events and bookings.
                </p>

                <!-- Button -->
                <a href="login.html" class="w-full">
                    <button class="w-full bg-[#0A243F] text-white py-3 rounded-lg text-sm font-medium hover:bg-[#F4A160] transition-colors duration-200">
                        Login
                    </button>
                </a>
            </div>
    </div>
    
    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        }

    </script>

</body>
</html>
