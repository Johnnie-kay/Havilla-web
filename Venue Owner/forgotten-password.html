<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgotten Password | Havilla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-lg w-full max-w-lg px-10 py-8">

        <nav class="md:hidden flex items-center justify-between py-2 mb-6 ">
            <div class="flex justify-center items-center gap-2">
                <img src="/Images/Logo.png" alt="Logo">
                <p class="text-[#0A243F] font-bold text-lg">Havilla.</p>
            </div>
            <button id="menuBtn" onclick="toggleMenu()" class="md:hidden text-[#0A243F] text-2xl">☰</button>
       </nav>

        <div id="mobileMenu" class="hidden md:hidden flex-col gap-4 px-6 pb-4 text-sm bg-white">
            <a class="text-[#0A243F] font-medium" href="#">Home</a>
            <a class="text-[#0A243F] opacity-50" href="#">How it works</a>
            <a class="text-[#0A243F] opacity-50" href="#">Features</a>
            <a class="text-[#0A243F]" href="#">Sign in</a>
        </div>


        <!-- Back -->
        <a href="login.html" class="flex items-center gap-2 text-sm text-[#0A243F] font-medium mb-6">
            ← Back
        </a>

        <!-- Illustration -->
        <div class="flex justify-center mb-6">
            <img src="../Images/Password-img.png" alt="Forgot Password" class="w-52">
        </div>

        <!-- Heading -->
        <h2 class="text-xl font-bold text-[#0A243F] text-center mb-2">Forgotten Password</h2>
        <p class="text-sm text-gray-500 text-center mb-6">
            Enter your email address and we'll send you an OTP to reset your password
        </p>

        <!-- Email -->
        <div class="mb-2">
            <label class="block text-sm font-medium text-[#0A243F] mb-1">Email Address</label>
            <div class="flex items-center border border-gray-200 rounded-lg px-3 py-2">
                <input type="email" placeholder="Enter email address" class="w-full text-sm outline-none text-gray-700 placeholder-gray-400">
                <span class="text-gray-300 text-xs">›</span>
            </div>
        </div>

        <!-- Resend -->
        <p class="text-xs text-gray-500 mb-6">
            Didn't get a code? <a href="#" class="text-[#F4A160]">Click to resend</a> (<span id="countdown">1:00</span>)
        </p>

        <!-- Verify button -->
        <button class="w-full bg-[#a8c4e0] text-white py-3 rounded-lg text-sm font-medium hover:bg-[#F4A160] transition-colors duration-200">
            Verify
        </button>

    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        }

        let seconds = 60;
        const countdown = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            countdown.textContent = `${m}:${s.toString().padStart(2, '0')}`;
            if (seconds <= 0) clearInterval(timer);
        }, 1000);
    </script>

</body>
</html>
